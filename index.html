<!DOCTYPE html>
<html lang="he">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>אופסס..</title>
    <link rel="icon" href="https://netfree.link/img/block-favicon.png">
    
    <style>
        body {
            direction: rtl;
            padding: 0;
            margin: 0;
            font-family: Arial, sans-serif;
            cursor: pointer; 
        }
        
        .block-msg {
            color: #3b4141;
            top: 0px;
            right: 0px;
            position: absolute; 
        }
        
        .block-msg h1 {
            font-size: 50px;
        }
        
        .logo-small {
            position: absolute;
            top: 0px;
            left: 0px;
        }
        
        .logo-small img { 
            width: 190px;
        }
        
        #oopss {
            font-size: 122px;
            font-weight: 700;
            margin-top: -50px;
            margin-bottom: -36px; 
            color: #009cda29;
        }

        #message {
            font-size: 38px;
            font-weight: 400;
            color: #7b7979;
        }
        
        #normal-block {
            margin: 30px 55px;
            position: relative;
        }

        .main-image {
            position: fixed;
            left: 1px;
            bottom: 1px;
            max-height: 90%;
            opacity: 0.7;
            max-width: 100%;
        }
    </style>
</head>
<body class="bc-sector">
    <div id="normal-block"> 

        <picture>
            <img class="main-image" src="https://netfree.link/block/paint_block/2k/error.avif" alt="חסימת מגזר">
        </picture>

        <div class="logo-small">
            <img src="https://netfree.link/img/logo/netfree_full_logo.svg" alt="NetFree logo - נטפרי לוגו">
        </div>

        <div class="block-msg">
            <h1 id="oopss">אופסס..</h1>
            <h2>
                <span id="message">קראוס לא מרשה לי לדבר איתך על זה.</span>
            </h2>
        </div>
        
    </div>

    <audio id="oopsAudio" src="Opss.mp3" preload="auto"></audio>

    <script>
        function initAudio() {
            var audio = document.getElementById("oopsAudio");
            var playCount = 0;
            var maxPlays = 3;

            // מסירים את ההאזנה גם לעכבר וגם למקלדת כדי שהקובץ לא יופעל פעמיים במקביל
            document.removeEventListener("click", initAudio);
            document.removeEventListener("keydown", initAudio);

            audio.play().then(function() {
                audio.onended = function() {
                    playCount++; 
                    if (playCount < maxPlays) {
                        audio.play(); 
                    }
                };
            }).catch(function(error) {
                console.log("שגיאה בהפעלה:", error);
            });
        }

        // מוסיפים מאזינים - גם ללחיצת עכבר (click) וגם ללחיצת מקלדת (keydown)
        document.addEventListener("click", initAudio);
        document.addEventListener("keydown", initAudio);
    </script>
</body>
</html>
